<svg width="100%" height="8" viewBox="0 0 1200 8" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="moveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="25%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="75%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0D1117"/>
      <animateTransform
        attributeName="gradientTransform"
        type="translate"
        from="-1 0"
        to="1 0"
        dur="2s"
        repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="8" rx="4" fill="url(#moveGradient)"/>
</svg>
