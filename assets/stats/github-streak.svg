<svg width="535" height="195" viewBox="0 0 535 195" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Streak</title>
  <desc id="desc">Current and longest contribution streaks from GitHub contribution calendar.</desc>
  <style>
    .num { fill: #C9D1D9; font: 700 26px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif; text-anchor: middle; }
    .label { fill: #C9D1D9; font: 12px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif; text-anchor: middle; }
    .accent { fill: #38BDF8; font: 700 12px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif; text-anchor: middle; }
    .date { fill: #8B949E; font: 10px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif; text-anchor: middle; }
  </style>
  <rect x="0.5" y="0.5" width="534" height="194" rx="6" fill="#0D1117" stroke="#30363D"/>
  <line x1="178" y1="30" x2="178" y2="168" stroke="#30363D"/>
  <line x1="357" y1="30" x2="357" y2="168" stroke="#30363D"/>
  <text x="89" y="78" class="num">206</text>
  <text x="89" y="108" class="label">Total Contributions</text>
  <text x="89" y="134" class="date">Jul 6 - Jul 11</text>
  <circle cx="267" cy="68" r="28" stroke="#38BDF8" stroke-width="4" fill="none"/>
  <text x="267" y="76" class="num">0</text>
  <text x="267" y="118" class="accent">Current Streak</text>
  <text x="267" y="142" class="date"></text>
  <text x="446" y="78" class="num">5</text>
  <text x="446" y="108" class="label">Longest Streak</text>
  <text x="446" y="134" class="date">Jun 8 - Jun 12</text>
</svg>
