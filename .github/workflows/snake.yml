name: Generate Snake

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: JorkLucas03
          outputs: |
            dist/github-snake.svg?color_snake=#38BDF8&color_dots=#161B22,#0EA5E9,#38BDF8,#7DD3FC,#E0F2FE
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#38BDF8&color_dots=#161B22,#0EA5E9,#38BDF8,#7DD3FC,#E0F2FE

      - name: Push snake animation to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
